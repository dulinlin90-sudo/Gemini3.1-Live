<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gemini 语音对话</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: #07070f; color: #e2e2f0;
      font-family: -apple-system, 'PingFang SC', sans-serif; overflow: hidden;
    }
    .app {
      height: 100dvh; display: flex; flex-direction: column;
      align-items: center; padding: 0 16px; max-width: 480px; margin: 0 auto;
    }
    h1 { font-size: 14px; color: #555570; letter-spacing: 0.12em; padding: 14px 0 10px; width: 100%; text-align: center; }

    .key-row { width: 100%; display: flex; gap: 8px; margin-bottom: 10px; }
    input {
      flex: 1; background: #10101c; border: 1px solid #1c1c2e;
      border-radius: 10px; padding: 11px 13px; color: #e2e2f0;
      font-size: 13px; outline: none; min-width: 0;
    }
    input:focus { border-color: #334499; }
    input::placeholder { color: #44445a; }
    .btn {
      border: none; border-radius: 10px; padding: 11px 18px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    #connBtn { background: #3b72ff; }
    #connBtn.off { background: #882222; }

    .orb-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
    .orb {
      width: 130px; height: 130px; border-radius: 50%; cursor: pointer;
      background: radial-gradient(circle at 38% 36%, #181832, #08080f);
      box-shadow: 0 0 24px #12124088, inset 0 0 24px #0a0a1a;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.5s, background 0.5s;
    }
    .orb.listen {
      background: radial-gradient(circle at 38% 36%, #002255, #001030);
      box-shadow: 0 0 55px #00d4ff55, inset 0 0 35px #003366;
      animation: breathe 1.8s ease-in-out infinite;
    }
    .orb.speak {
      background: radial-gradient(circle at 38% 36%, #38006a, #1a0030);
      box-shadow: 0 0 55px #a855f755, inset 0 0 35px #500080;
    }
    @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .orb svg { color: #3a3a5e; transition: color 0.4s; }
    .orb.listen svg { color: #00d4ff; }
    .orb.speak  svg { color: #a855f7; }

    #orbLabel { font-size: 13px; color: #55556a; text-align: center; }
    #orbLabel.bright { color: #aaaacc; }

    .mic-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid #1c1c2e; background: #10101c;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .mic-btn:active { transform: scale(0.92); }
    .mic-btn.on { border-color: #00d4ff; background: #00d4ff10; box-shadow: 0 0 16px #00d4ff30; }
    .mic-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Debug log */
    .dbg {
      width: 100%; background: #080812; border: 1px solid #181828;
      border-radius: 10px; padding: 8px 10px;
      height: 140px; overflow-y: auto; -webkit-overflow-scrolling: touch;
      font-size: 11px; font-family: 'Menlo', 'Courier New', monospace; color: #556677;
      flex-shrink: 0; margin-bottom: 6px;
    }
    .dbg::-webkit-scrollbar { display: none; }
    .line { line-height: 1.65; }
    .line.ok   { color: #22c55e; }
    .line.err  { color: #f87171; }
    .line.info { color: #60a5fa; }

    .chat {
      width: 100%; height: 80px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column; gap: 5px;
    }
    .chat::-webkit-scrollbar { display: none; }
    .bubble { max-width: 88%; padding: 6px 10px; border-radius: 10px; font-size: 12px; line-height: 1.5; }
    .bubble.user  { align-self: flex-end; background: #182044; color: #96bcff; border-bottom-right-radius: 3px; }
    .bubble.model { align-self: flex-start; background: #10101c; color: #e2e2f0; border-bottom-left-radius: 3px; }
    .who { font-size: 9px; color: #44445a; margin-bottom: 2px; }
    .pad { height: 10px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="app">
  <h1>GEMINI · LIVE</h1>

  <div class="key-row">
    <input id="apiKey" type="password" placeholder="粘贴 Gemini API Key…" autocomplete="off" spellcheck="false">
    <button class="btn" id="connBtn" onclick="toggleConnect()">连接</button>
  </div>

  <div class="orb-area">
    <div class="orb" id="orb" onclick="handleOrbClick()">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
      </svg>
    </div>
    <div id="orbLabel">输入 API Key 后点击连接</div>
    <button class="mic-btn" id="micBtn" disabled onclick="toggleTalk()">🎙</button>
  </div>

  <div class="dbg" id="dbg"></div>
  <div class="chat" id="chat"></div>
  <div class="pad"></div>
</div>

<script>
'use strict';

var ws = null, audioCtx = null, micStream = null, srcNode = null, procNode = null;
var listening = false, connected = false, nextTime = 0;
var IN_RATE = 16000, OUT_RATE = 24000;
var MODEL = 'gemini-2.0-flash-exp'; // 修复点 1: Live API 的标准实验模型名称

var orb     = document.getElementById('orb');
var orbLbl  = document.getElementById('orbLabel');
var connBtn = document.getElementById('connBtn');
var micBtn  = document.getElementById('micBtn');
var chat    = document.getElementById('chat');
var dbgBox  = document.getElementById('dbg');

function log(msg, type) {
  var d = document.createElement('div');
  d.className = 'line' + (type ? ' ' + type : '');
  var t = new Date();
  var ts = ('0'+t.getHours()).slice(-2)+':'+('0'+t.getMinutes()).slice(-2)+':'+('0'+t.getSeconds()).slice(-2);
  d.textContent = '['+ts+'] ' + msg;
  dbgBox.appendChild(d);
  dbgBox.scrollTop = dbgBox.scrollHeight;
  console.log(msg);
}

log('浏览器: ' + navigator.userAgent.slice(0,50));
log('协议: ' + location.protocol + ' / ' + location.hostname);
log('WebSocket 支持: ' + (typeof WebSocket !== 'undefined' ? '是' : '否'));

function toggleConnect() {
  if (connected) { doDisconnect(); return; }
  var key = document.getElementById('apiKey').value.trim();
  if (!key) { setLabel('请先输入 API Key'); return; }

  setLabel('正在连接…');
  log('── 开始连接 ──', 'info');

  var url = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=' + key;
  log('URL: wss://generativelanguage.googleapis.com/ws/...');

  try {
    ws = new WebSocket(url);
    log('WebSocket 创建 OK，state=' + ws.readyState);
  } catch(e) {
    log('WebSocket 创建失败: ' + e.message, 'err');
    setLabel('创建失败');
    return;
  }

  ws.binaryType = 'blob';

  ws.onopen = function() {
    log('onopen ✓ readyState=' + ws.readyState, 'ok');
    
    // 修复点 2: 使用官方 API 要求的 camelCase 参数格式，并移除会导致拒接连接的非法/实验性字段
    var msg = JSON.stringify({
      setup: {
        model: 'models/' + MODEL,
        generationConfig: {
          responseModalities: ['AUDIO'],
          speechConfig: { 
            voiceConfig: { 
              prebuiltVoiceConfig: { 
                voiceName: 'Aoede' 
              } 
            } 
          }
        },
        systemInstruction: { 
          parts: [{ text: '你是一个友好的语音助手，请用简洁中文回答。' }] 
        }
      }
    });
    ws.send(msg);
    log('setup 已发送(' + msg.length + ' 字节)，等待响应…', 'info');
  };

  ws.onmessage = function(evt) {
    var dataInfo = evt.data instanceof Blob
      ? 'Blob size=' + evt.data.size
      : 'string len=' + evt.data.length;

    if (evt.data instanceof Blob) {
      evt.data.text().then(function(txt) {
        handleText(txt);
      }).catch(function(e) {
        log('Blob.text() 失败: ' + e.message, 'err');
      });
    } else {
      handleText(evt.data);
    }
  };

  ws.onerror = function(e) {
    log('onerror: ' + (e.message || e.type || JSON.stringify(e)), 'err');
    setLabel('连接出错，检查 API Key');
    doDisconnect();
  };

  ws.onclose = function(e) {
    log('onclose code=' + e.code + ' reason="' + (e.reason||'') + '" clean=' + e.wasClean,
        connected ? 'err' : '');
    if (connected) { setLabel('连接已断开'); doDisconnect(); }
  };

  setTimeout(function() {
    if (!connected && ws && ws.readyState !== WebSocket.CLOSED) {
      log('⚠️ 10秒内未收到 setupComplete，state=' + ws.readyState, 'err');
    }
  }, 10000);
}

function handleText(txt) {
  var msg;
  try { msg = JSON.parse(txt); } catch(e) { log('JSON解析失败: ' + e.message, 'err'); return; }

  if (msg.setupComplete !== undefined) {
    log('✓ setupComplete 收到，连接成功！', 'ok');
    onConnected();
    return;
  }

  var sc = msg.serverContent;
  if (!sc) return;

  if (sc.modelTurn && sc.modelTurn.parts) {
    for (var i = 0; i < sc.modelTurn.parts.length; i++) {
      var p = sc.modelTurn.parts[i];
      if (p.inlineData && p.inlineData.mimeType && p.inlineData.mimeType.indexOf('audio') >= 0) {
        setOrbState('speak');
        playPCM(p.inlineData.data);
      }
    }
  }
  // 如果开启了文字转录，将其显示在气泡中（取决于API侧状态）
  if (sc.modelTurn && sc.modelTurn.parts && sc.modelTurn.parts[0].text) addBubble('model', sc.modelTurn.parts[0].text);
  if (sc.turnComplete) { setTimeout(function(){ if(!listening) setOrbState('idle'); }, 400); }
}

function doDisconnect() {
  if (ws) { try { ws.close(); } catch(_){} ws = null; }
  stopMic();
  connected = false; listening = false;
  connBtn.textContent = '连接'; connBtn.classList.remove('off');
  micBtn.disabled = true; micBtn.classList.remove('on');
  setOrbState('idle');
  setLabel('输入 API Key 后点击连接');
}

function onConnected() {
  connected = true;
  connBtn.textContent = '断开'; connBtn.classList.add('off');
  micBtn.disabled = false;
  setLabel('点击麦克风开始说话');
}

// ── Playback ─────────────────────────────────────────────────────────────
function playPCM(b64) {
  if (!audioCtx) return;
  try {
    var bin = atob(b64);
    var u8  = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    var i16 = new Int16Array(u8.buffer);
    var f32 = new Float32Array(i16.length);
    for (var j = 0; j < i16.length; j++) f32[j] = i16[j] / 32768;
    var buf = audioCtx.createBuffer(1, f32.length, OUT_RATE);
    buf.getChannelData(0).set(f32);
    var src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination);
    var start = Math.max(audioCtx.currentTime, nextTime);
    src.start(start);
    nextTime = start + buf.duration;
  } catch(e) { log('播放失败: ' + e.message, 'err'); }
}

// ── Microphone ────────────────────────────────────────────────────────────
function handleOrbClick() { if (connected) toggleTalk(); }

function toggleTalk() {
  if (!connected) return;
  if (listening) {
    stopMic(); setOrbState('idle'); micBtn.classList.remove('on');
    setLabel('点击麦克风开始说话');
  } else { startMic(); }
}

function startMic() {
  log('请求麦克风…', 'info');
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      log('AudioContext OK, rate=' + audioCtx.sampleRate, 'ok');
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
      log('AudioContext resume() 调用');
    }
    nextTime = 0;
  } catch(e) { log('AudioContext 失败: ' + e.message, 'err'); return; }

  navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true } })
    .then(function(stream) {
      log('麦克风 OK ✓', 'ok');
      micStream = stream;
      srcNode  = audioCtx.createMediaStreamSource(stream);
      procNode = audioCtx.createScriptProcessor(4096, 1, 1);
      procNode.onaudioprocess = function(e) {
        if (!listening || !ws || ws.readyState !== 1) return;
        var raw = e.inputBuffer.getChannelData(0);
        var pcm = downsample(raw, audioCtx.sampleRate, IN_RATE);
        ws.send(JSON.stringify({
          realtimeInput: { mediaChunks: [{ mimeType: 'audio/pcm;rate=' + IN_RATE, data: toB64(pcm.buffer) }] }
        }));
      };
      srcNode.connect(procNode);
      procNode.connect(audioCtx.destination);
      listening = true;
      micBtn.classList.add('on');
      setOrbState('listen');
      setLabel('正在聆听…');
    })
    .catch(function(e) {
      log('麦克风失败: ' + e.name + ' - ' + e.message, 'err');
      setLabel('麦克风权限被拒绝');
    });
}

function stopMic() {
  listening = false;
  if (procNode) { procNode.disconnect(); procNode = null; }
  if (srcNode)  { srcNode.disconnect();  srcNode  = null; }
  if (micStream){ micStream.getTracks().forEach(function(t){ t.stop(); }); micStream = null; }
}

function downsample(f32, from, to) {
  var ratio = from / to, len = Math.ceil(f32.length / ratio);
  var out = new Int16Array(len);
  for (var i = 0; i < len; i++) {
    var s = Math.max(-1, Math.min(1, f32[Math.min(Math.round(i*ratio), f32.length-1)]));
    out[i] = s < 0 ? s*0x8000 : s*0x7FFF;
  }
  return out;
}

// 修复点 3: 更安全稳定的 Base64 转换方法，避免大数组在移动端引发 Maximum Call Stack Size Exceeded 错误
function toB64(buf) {
  var binary = '';
  var bytes = new Uint8Array(buf);
  var len = bytes.byteLength;
  for (var i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function setOrbState(state) {
  orb.className = 'orb' + (state==='listen' ? ' listen' : state==='speak' ? ' speak' : '');
}
function setLabel(t) {
  orbLbl.textContent = t;
  orbLbl.className = (t === '输入 API Key 后点击连接') ? '' : 'bright';
}
function addBubble(role, text) {
  var last = chat.querySelector('.bubble:last-child');
  if (last && last.dataset.role === role) {
    last.querySelector('.bt').textContent = text;
  } else {
    var d = document.createElement('div');
    d.className = 'bubble ' + role; d.dataset.role = role;
    d.innerHTML = '<div class="who">'+(role==='user'?'你':'Gemini')+'</div><div class="bt">'+esc(text)+'</div>';
    chat.appendChild(d);
  }
  chat.scrollTop = chat.scrollHeight;
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('apiKey').addEventListener('keydown', function(e){ if(e.key==='Enter') toggleConnect(); });
</script>
</body>
</html>
